services:
  # Bootstrap Laravel app if missing (runs once, then skips on subsequent up).
  laravel-create:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravelvue-php
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: sh -lc "if [ -f app/artisan ]; then echo 'Laravel already exists.'; else echo 'Clearing stale ./app directory...'; rm -rf app && composer create-project \"laravel/laravel:^12.0\" app --prefer-dist --no-interaction; fi"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./app/public:/var/www/html/public:ro
      - ./app/storage:/var/www/html/storage
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
      vite-build:
        condition: service_completed_successfully

  php:
    image: laravelvue-php
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/var/www/html
    expose:
      - "9000"
    environment:
      APP_URL: http://localhost:8080
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql

  composer:
    image: composer:2
    profiles: ["tools"]
    volumes:
      - ./:/workspace
    working_dir: /workspace

  node:
    image: node:20-alpine
    profiles: ["tools"]
    volumes:
      - ./:/workspace
    working_dir: /workspace

  # Ensure `.env` exists and `APP_KEY` is generated.
  app-env-key:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravelvue-php
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      laravel-create:
        condition: service_completed_successfully
    command: sh -lc "if [ -f .env ] && [ -f .env.example ]; then echo '.env already exists.'; elif [ -f .env.example ]; then cp .env.example .env; echo 'Copied .env.example -> .env'; else echo 'Missing .env.example; run scaffold first.'; exit 1; fi; if ! grep -qE '^APP_KEY=base64:' .env; then php artisan key:generate --no-interaction; else echo 'APP_KEY already set.'; fi"

  # php-fpm workers run as `www-data`, but Laravel bootstrap can create `storage/` as `root`.
  # Fix ownership/permissions so view compilation doesn't throw `tempnam()` errors.
  storage-perms:
    image: laravelvue-php
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    depends_on:
      laravel-create:
        condition: service_completed_successfully
    command: sh -lc "chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true; chmod -R 775 storage bootstrap/cache 2>/dev/null || true; echo 'storage perms fixed'"

  # Run `composer install` only if `vendor/` is missing.
  composer-install:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravelvue-php
    volumes:
      - ./:/workspace
    working_dir: /workspace/app
    depends_on:
      storage-perms:
        condition: service_completed_successfully
    command: sh -lc "if [ -f vendor/autoload.php ]; then echo 'Composer dependencies already installed.'; else if [ -f composer.lock ]; then echo 'composer.lock found; running composer install'; else echo 'composer.lock missing; running composer install'; fi; composer install --no-interaction --prefer-dist; fi"

  # Install Breeze + Vue stack if not installed yet.
  breeze-install:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravelvue-php
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      composer-install:
        condition: service_completed_successfully
    command: sh -lc "if [ -f app/package.json ] || [ -d app/vendor/laravel/breeze ]; then echo 'Breeze looks installed; skipping.'; else composer require laravel/breeze --dev --no-interaction; fi"

  breeze-vue:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravelvue-php
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    depends_on:
      breeze-install:
        condition: service_completed_successfully
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    command: sh -lc "if [ -f package.json ] && [ -d resources/js ]; then echo 'Vue/Breeze stack already present; skipping.'; else php artisan breeze:install vue --no-interaction; fi"

  # Apply Breeze/ Laravel migrations so the app is usable immediately.
  db-migrate:
    image: laravelvue-php
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    depends_on:
      mysql:
        condition: service_started
      breeze-vue:
        condition: service_completed_successfully
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    command: sh -lc "i=0; until php artisan migrate --no-interaction --force; do i=$((i+1)); if [ \"$$i\" -ge 30 ]; then echo 'Migrations failed after retries.'; exit 1; fi; echo 'Waiting for MySQL...'; sleep 2; done"

  vite-build:
    # Runs Vite build once to generate `public/build` (served by Nginx).
    image: node:20-alpine
    volumes:
      - ./:/workspace
    working_dir: /workspace/app
    command: sh -lc "if [ -f public/build/manifest.json ]; then echo 'Skipping Vite build (manifest exists).'; else if [ -f package-lock.json ]; then npm ci; else npm install; fi; npm run build; fi"
    depends_on:
      breeze-vue:
        condition: service_completed_successfully
    restart: "no"

volumes:
  mysql_data:

